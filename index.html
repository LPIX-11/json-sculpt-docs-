    <noscript>
      <h1>jsonSculpt — JSON Mapper & Transformation Engine</h1>
      <p>jsonSculpt is a zero-dependency, lightweight JavaScript library for declaratively mapping and transforming JSON data. Perfect for reshaping API responses, normalizing data structures, and building data pipelines.</p>
      <h2>Features</h2>
      <ul>
        <li>@link paths — Deep property access with dot notation</li>
        <li>Type casting — ::number, ::string, ::boolean, ::date</li>
        <li>$map and $transform — Array iteration and reshaping</li>
        <li>$map and $extract — Pull single fields from arrays</li>
        <li>$spread — Merge array items into objects</li>
        <li>$recursive — Handle infinite-depth tree structures</li>
        <li>Fallback chains — Graceful null/undefined handling</li>
        <li>Dynamic keys — Computed property names from data</li>
        <li>$op operators — 17+ built-in string, number, date, and array operators</li>
        <li>Custom operators — Register your own transformations</li>
      </ul>
      <h2>Installation</h2>
      <p>npm install @sonatel-os/json-sculpt</p>
      <p>Created by Mohamed Johnson (LPIX-11)</p>
